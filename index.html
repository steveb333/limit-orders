<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Limit Orders</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg0: #060a12; --bg1: #0a0e17; --bg2: #111827; --bg3: #151d2e;
  --bg-hover: #1a2540; --border: #1e2a42; --border2: #2a3a5c;
  --t1: #e2e8f0; --t2: #8899b4; --t3: #4a5c7a;
  --green: #22c55e; --green-bg: rgba(34,197,94,.08);
  --red: #ef4444; --red-bg: rgba(239,68,68,.08);
  --amber: #f59e0b; --amber-bg: rgba(245,158,11,.08);
  --blue: #3b82f6; --cyan: #06b6d4; --gold: #d4a017;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg1);color:var(--t1);font-family:'DM Sans',sans-serif;min-height:100vh}

/* ── HEADER ── */
.header{padding:20px 28px 14px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border)}
.header h1{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.header h1 .accent{color:var(--green)}
.header .sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);margin-top:3px}
.hdr-right{display:flex;align-items:center;gap:12px}
.market-badge{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t2)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--t3);flex-shrink:0}
.dot.live{background:var(--green);animation:pulse 2s infinite}
.dot.after{background:var(--amber);animation:pulse 3s infinite}
.dot.closed{background:var(--t3)}
.dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── TABS ── */
.tabs{display:flex;gap:0;padding:0 28px;border-bottom:1px solid var(--border)}
.tab{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;padding:12px 24px;cursor:pointer;color:var(--t3);border-bottom:2px solid transparent;transition:all .15s;letter-spacing:1px;text-transform:uppercase}
.tab:hover{color:var(--t2)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ── ALERTS ── */
.alerts{padding:10px 28px;display:flex;flex-wrap:wrap;gap:6px;min-height:10px}
.pill{font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;border-radius:16px;display:inline-flex;align-items:center;gap:5px}
.pill.hot{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.pill.warm{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.pill.near-target{background:rgba(59,130,246,.08);color:var(--blue);border:1px solid rgba(59,130,246,.2)}

/* ── CONFIG PANEL ── */
.config{margin:12px 28px;padding:14px 18px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px}
.config-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.config-row:last-child{margin-bottom:0}
.config label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t2);white-space:nowrap;min-width:120px}
.config input[type=text],.config input[type=password]{flex:1;min-width:180px;background:var(--bg2);border:1px solid var(--border);color:var(--t1);font-family:'JetBrains Mono',monospace;font-size:12px;padding:7px 10px;border-radius:5px;outline:none}
.config input:focus{border-color:var(--gold)}
.config input::placeholder{color:var(--t3)}

/* ── BUTTONS ── */
.btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;padding:7px 14px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);color:var(--t2);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--gold);color:var(--t1)}
.btn.gold{background:var(--gold);color:#000;border-color:var(--gold)}
.btn.gold:hover{background:#e8b520}
.btn.sm{padding:5px 10px;font-size:9px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;padding:8px 28px}
.btn-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:3px;transition:all .15s;font-family:'JetBrains Mono',monospace}
.btn-del:hover{color:var(--red);background:var(--red-bg)}

/* ── SUMMARY ── */
.summary{display:flex;gap:10px;padding:10px 28px;flex-wrap:wrap}
.scard{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:12px 18px;min-width:150px}
.scard .sl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.scard .sv{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;margin-top:3px}
.scard .sd{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);margin-top:2px}

/* ── TABLE ── */
.twrap{padding:0 28px 28px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0;background:var(--bg1);z-index:2}
thead th:hover{color:var(--t2)}
thead th.asc::after{content:' ▲';font-size:8px}
thead th.desc::after{content:' ▼';font-size:8px}
thead th:last-child{cursor:default}
tbody td{padding:8px 12px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:12px;white-space:nowrap;vertical-align:middle}
tbody tr:hover{background:var(--bg-hover)}

/* Editable cells */
td.editable{cursor:pointer;position:relative}
td.editable:hover{background:rgba(212,160,23,.06)}
td.editable input{width:100%;background:var(--bg2);border:1px solid var(--gold);color:var(--t1);font-family:'JetBrains Mono',monospace;font-size:12px;padding:4px 6px;border-radius:3px;outline:none}
td.note-cell{max-width:220px;white-space:normal;word-wrap:break-word}
td.note-cell input{width:100%;min-width:120px;background:var(--bg2);border:1px solid var(--gold);color:var(--t1);font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 6px;border-radius:3px;outline:none}
.note-text{color:var(--t3);font-size:11px;cursor:pointer;font-style:italic}
.note-text.has-note{color:var(--t2);font-style:normal}

/* Colors for limit diff */
.at-limit{color:var(--green);font-weight:600}
.near-limit{color:var(--amber)}
.far-limit{color:var(--t2)}
.no-data{color:var(--t3)}
.up{color:var(--green)}.down{color:var(--red)}
.ticker-name{color:var(--t1);font-weight:600;font-size:13px}

/* Row highlight */
tr.row-at-limit{background:var(--green-bg)}
tr.row-near-limit{background:var(--amber-bg)}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:var(--bg1);display:flex;align-items:center;justify-content:center;z-index:999;transition:opacity .3s}
#loading.hide{opacity:0;pointer-events:none}
#loading span{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--gold)}

.sync-status{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);padding:0 28px 4px}

@media(max-width:768px){
  .header{padding:14px 16px 10px;flex-direction:column;gap:8px}
  .tabs{padding:0 16px}.alerts{padding:8px 16px}
  .config{margin:8px 16px}.btn-row{padding:6px 16px}
  .summary{padding:8px 16px}.twrap{padding:0 16px 16px}
  table{font-size:11px}
  thead th,tbody td{padding:6px 8px}
}
</style>
</head>

const TWELVE_DATA_TICKERS = new Set(['ARREF','AYASF','BHP','BYAGF','CNQ','COAL','CTTZF']);

let DATA = { bdc: [], natres: [] };

// ══════════════════════════════════════════════════════════════════
//  MARKET STATUS
// ══════════════════════════════════════════════════════════════════

function getMarketStatus() {
  const now = new Date();
  const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const day = et.getDay();
  const h = et.getHours();
  const m = et.getMinutes();
  const mins = h * 60 + m;

  if (day === 0 || day === 6) return { status: 'closed', label: 'Weekend — Closed' };
  if (mins >= 570 && mins < 960) return { status: 'live', label: 'Market Open' };
  if (mins >= 960 && mins < 1200) return { status: 'after', label: 'After Hours' };
  if (mins >= 240 && mins < 570) return { status: 'after', label: 'Pre-Market' };
  return { status: 'closed', label: 'Market Closed' };
}

function updateMarketStatus() {
  const ms = getMarketStatus();
  const dot = document.getElementById('mktDot');
  const txt = document.getElementById('mktText');
  dot.className = 'dot ' + ms.status;
  txt.textContent = ms.label;
}

// ══════════════════════════════════════════════════════════════════
//  CONFIG / LOCAL STORAGE
// ══════════════════════════════════════════════════════════════════

function lsGet(k) { try { return localStorage.getItem(k); } catch(e) { return null; } }
function lsSet(k,v) { try { localStorage.setItem(k,v); } catch(e) {} }

function loadConfig() {
  return {
    finnhubKey: lsGet('cfg_finnhub') || '',
    twelveKey:  lsGet('cfg_twelve') || '',
    gistToken:  lsGet('cfg_gist_token') || '',
    gistId:     lsGet('cfg_gist_id') || '',
  };
}

function saveConfig() {
  lsSet('cfg_finnhub',    document.getElementById('finnhubKey').value.trim());
  lsSet('cfg_twelve',     document.getElementById('twelveKey').value.trim());
  lsSet('cfg_gist_token', document.getElementById('gistToken').value.trim());
  lsSet('cfg_gist_id',    document.getElementById('gistId').value.trim());
  showSync('Config saved ✓');
}

function populateConfigFields() {
  const c = loadConfig();
  document.getElementById('finnhubKey').value = c.finnhubKey;
  document.getElementById('twelveKey').value = c.twelveKey;
  document.getElementById('gistToken').value = c.gistToken;
  document.getElementById('gistId').value = c.gistId;
  // Migrate old key from previous dashboard version
  if (!c.finnhubKey) {
    const old = lsGet('finnhub_api_key');
    if (old) { document.getElementById('finnhubKey').value = old; lsSet('cfg_finnhub', old); }
  }
}

// ══════════════════════════════════════════════════════════════════
//  GITHUB GIST SYNC
// ══════════════════════════════════════════════════════════════════

async function syncToGist() {
  const cfg = loadConfig();
  if (!cfg.gistToken) return;

  const payload = JSON.stringify({ bdc: DATA.bdc, natres: DATA.natres }, null, 2);
  const files = { 'limit_orders.json': { content: payload } };

  try {
    let res;
    if (cfg.gistId) {
      res = await fetch(`https://api.github.com/gists/${cfg.gistId}`, {
        method: 'PATCH',
        headers: { 'Authorization': `token ${cfg.gistToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ files })
      });
    } else {
      res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: { 'Authorization': `token ${cfg.gistToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ description: 'Limit Orders Data', public: false, files })
      });
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!cfg.gistId && data.id) {
      lsSet('cfg_gist_id', data.id);
      document.getElementById('gistId').value = data.id;
    }
    showSync('Synced to Gist ✓ ' + new Date().toLocaleTimeString());
  } catch (e) {
    showSync('Gist sync failed: ' + e.message, true);
  }
}

async function loadFromGist() {
  const cfg = loadConfig();
  if (!cfg.gistToken || !cfg.gistId) return false;
  try {
    const res = await fetch(`https://api.github.com/gists/${cfg.gistId}`, {
      headers: { 'Authorization': `token ${cfg.gistToken}` }
    });
    if (!res.ok) return false;
    const gist = await res.json();
    const file = gist.files['limit_orders.json'];
    if (!file) return false;
    const parsed = JSON.parse(file.content);
    if (parsed.bdc && Array.isArray(parsed.bdc)) DATA.bdc = parsed.bdc;
    if (parsed.natres && Array.isArray(parsed.natres)) DATA.natres = parsed.natres;
    showSync('Loaded from Gist ✓');
    return true;
  } catch (e) {
    showSync('Gist load failed: ' + e.message, true);
    return false;
  }
}

async function testSync() { saveConfig(); await syncToGist(); }

function debouncedSync() {
  if (gistSyncTimer) clearTimeout(gistSyncTimer);
  gistSyncTimer = setTimeout(syncToGist, 3000);
}

function showSync(msg, isError) {
  const el = document.getElementById('syncStatus');
  el.textContent = msg;
  el.style.color = isError ? 'var(--red)' : 'var(--t3)';
}

// ══════════════════════════════════════════════════════════════════
//  PRICE FETCHING
// ══════════════════════════════════════════════════════════════════

async function fetchFinnhub(tickers, target) {
  const cfg = loadConfig();
  if (!cfg.finnhubKey || !tickers.length) return;
  // Stagger to stay under 60/min
  for (let i = 0; i < tickers.length; i++) {
    const t = tickers[i];
    try {
      const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(t)}&token=${cfg.finnhubKey}`);
      const d = await res.json();
      if (d && d.c && d.c > 0) target[t] = d.c;
    } catch(e) {}
    // Small delay every 10 calls to avoid burst limits
    if (i > 0 && i % 10 === 0) await new Promise(r => setTimeout(r, 200));
  }
}

async function fetchTwelveData(tickers, target) {
  const cfg = loadConfig();
  if (!cfg.twelveKey || !tickers.length) return;
  const batchSize = 8;
  for (let i = 0; i < tickers.length; i += batchSize) {
    const batch = tickers.slice(i, i + batchSize);
    const symbols = batch.join(',');
    try {
      const res = await fetch(`https://api.twelvedata.com/price?symbol=${encodeURIComponent(symbols)}&apikey=${cfg.twelveKey}`);
      const data = await res.json();
      if (batch.length === 1) {
        if (data.price) target[batch[0]] = parseFloat(data.price);
      } else {
        for (const sym of batch) {
          if (data[sym] && data[sym].price) target[sym] = parseFloat(data[sym].price);
        }
      }
    } catch(e) {}
    if (i + batchSize < tickers.length) await new Promise(r => setTimeout(r, 500));
  }
}

async function fetchAllPrices() {
  // BDC: all via Finnhub
  const bdcTickers = DATA.bdc.map(r => r.ticker);
  await fetchFinnhub(bdcTickers, PRICES.bdc);

  // NatRes: split between Twelve Data (known working) and Finnhub (everything else)
  const natresTD = DATA.natres.filter(r => TWELVE_DATA_TICKERS.has(r.ticker)).map(r => r.ticker);
  const natresFH = DATA.natres.filter(r => !TWELVE_DATA_TICKERS.has(r.ticker)).map(r => r.ticker);

  // Fetch Twelve Data tickers first
  await fetchTwelveData(natresTD, PRICES.natres);

  // Fetch remaining via Finnhub
  await fetchFinnhub(natresFH, PRICES.natres);

  // Fallback: any NatRes tickers Finnhub missed, try Twelve Data
  const missing = DATA.natres
    .filter(r => !PRICES.natres[r.ticker] && !TWELVE_DATA_TICKERS.has(r.ticker))
    .map(r => r.ticker);
  if (missing.length > 0) {
    await fetchTwelveData(missing, PRICES.natres);
  }
}

async function refreshAll() {
  updateMarketStatus();
  try {
    await fetchAllPrices();
    renderTab(activeTab);
    const now = new Date();
    document.getElementById('lastUpdate').textContent =
      `Last updated: ${now.toLocaleString('en-US', {
        timeZone:'America/New_York', month:'short', day:'numeric',
        hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true
      })} ET`;
  } catch(e) {
    console.error('Refresh error:', e);
  }
}

// ══════════════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════════════

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  document.getElementById('panel-' + tab).style.display = '';
  // Update header title
  if (tab === 'bdc') {
    document.querySelector('.header h1').innerHTML = 'BDC <span class="accent">LIMIT ORDERS</span>';
  } else if (tab === 'natres') {
    document.querySelector('.header h1').innerHTML = 'NATURAL RESOURCES <span class="accent">LIMIT ORDERS</span>';
  } else {
    document.querySelector('.header h1').innerHTML = '<span class="accent">SETTINGS</span>';
  }
  if (tab !== 'config') renderTab(tab);
}

function renderTab(tab) {
  const rows = DATA[tab];
  const prices = PRICES[tab];
  const tbody = document.querySelector(`#table-${tab} tbody`);
  const alertsEl = document.getElementById(`alerts-${tab}`);
  const summaryEl = document.getElementById(`summary-${tab}`);

  // Sort — items with no limit (0) always go to bottom
  const s = SORT[tab];
  let sorted = [...rows];
  if (s.col) {
    sorted.sort((a, b) => {
      const aNoLimit = !a.limit;
      const bNoLimit = !b.limit;
      // No-limit rows always at bottom
      if (aNoLimit && !bNoLimit) return 1;
      if (!aNoLimit && bNoLimit) return -1;
      if (aNoLimit && bNoLimit) return a.ticker.localeCompare(b.ticker);

      let va = getSortVal(a, s.col, prices, tab);
      let vb = getSortVal(b, s.col, prices, tab);
      if (typeof va === 'string') return s.dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      // Push NaN/no-price to bottom within sorted group
      const aValid = isFinite(va);
      const bValid = isFinite(vb);
      if (!aValid && bValid) return 1;
      if (aValid && !bValid) return -1;
      if (!aValid && !bValid) return 0;
      return s.dir === 'asc' ? va - vb : vb - va;
    });
  }

  // Compute stats
  const hot = [], warm = [], nearTarget = [];
  for (const r of rows) {
    const p = prices[r.ticker];
    if (!p || !r.limit) continue;
    const diff = (p - r.limit) / r.limit;
    if (diff <= 0) hot.push(r.ticker);
    else if (diff < 0.05) warm.push(r.ticker);
  }
  if (tab === 'bdc') {
    for (const r of rows) {
      const p = prices[r.ticker];
      if (p && r.target && r.target > 0) {
        const pct = (r.target - p) / p;
        if (pct <= 0.05 && pct >= -0.05) nearTarget.push(r.ticker);
      }
    }
  }

  // Avg upside (BDC) or avg limit diff
  let avgStat = null, avgRange = '';
  if (tab === 'bdc') {
    const upsides = rows.filter(r => prices[r.ticker] && r.target).map(r => (r.target - prices[r.ticker]) / prices[r.ticker] * 100);
    if (upsides.length) {
      avgStat = (upsides.reduce((a,b)=>a+b,0) / upsides.length);
      avgRange = `${Math.min(...upsides).toFixed(1)}% — ${Math.max(...upsides).toFixed(1)}%`;
    }
  } else {
    const diffs = rows.filter(r => prices[r.ticker] && r.limit).map(r => (prices[r.ticker] - r.limit) / r.limit * 100);
    if (diffs.length) {
      avgStat = (diffs.reduce((a,b)=>a+b,0) / diffs.length);
      avgRange = `${Math.min(...diffs).toFixed(1)}% — ${Math.max(...diffs).toFixed(1)}%`;
    }
  }

  // Alerts
  let alertsHtml = '';
  hot.forEach(t => alertsHtml += `<span class="pill hot">● ${t} at or below limit — check broker</span>`);
  warm.forEach(t => alertsHtml += `<span class="pill warm">◉ ${t} within 5% of limit — approaching buy zone</span>`);
  nearTarget.forEach(t => alertsHtml += `<span class="pill near-target">▲ ${t} near target</span>`);
  alertsEl.innerHTML = alertsHtml;

  // Summary cards
  const totalTickers = rows.length;
  const priced = rows.filter(r => prices[r.ticker]).length;
  let summaryHtml = '';
  if (tab === 'bdc') {
    summaryHtml += `<div class="scard"><div class="sl">Avg Upside to Target</div><div class="sv" style="color:var(--green)">${avgStat !== null ? (avgStat >= 0 ? '+' : '') + avgStat.toFixed(1) + '%' : '—'}</div><div class="sd">${avgRange}</div></div>`;
  } else {
    summaryHtml += `<div class="scard"><div class="sl">Avg Distance to Limit</div><div class="sv">${avgStat !== null ? (avgStat >= 0 ? '+' : '') + avgStat.toFixed(1) + '%' : '—'}</div><div class="sd">${avgRange}</div></div>`;
  }
  summaryHtml += `<div class="scard"><div class="sl">At or Below Limit</div><div class="sv" style="color:${hot.length ? 'var(--green)' : 'var(--t1)'}">${hot.length}</div><div class="sd">${hot.length ? hot.join(', ') : 'None right now'}</div></div>`;
  summaryHtml += `<div class="scard"><div class="sl">Within 5% of Limit</div><div class="sv" style="color:${warm.length ? 'var(--amber)' : 'var(--t1)'}">${warm.length}</div><div class="sd">${warm.length ? warm.join(', ') : ''}</div></div>`;
  if (tab === 'bdc') {
    summaryHtml += `<div class="scard"><div class="sl">Near Target (±5%)</div><div class="sv">${nearTarget.length}</div><div class="sd">${nearTarget.length ? nearTarget.join(', ') : ''}</div></div>`;
  }
  summaryHtml += `<div class="scard"><div class="sl">Priced</div><div class="sv">${priced}/${totalTickers}</div></div>`;
  summaryEl.innerHTML = summaryHtml;

  // Table rows
  let html = '';
  for (let i = 0; i < sorted.length; i++) {
    const r = sorted[i];
    const idx = rows.indexOf(r);
    const p = prices[r.ticker] || null;
    const limit = r.limit || 0;
    const limitDiff = (p && limit) ? ((p - limit) / limit * 100) : null;
    const limitDiffStr = limitDiff !== null ? (limitDiff >= 0 ? '+' : '') + limitDiff.toFixed(1) + '%' : '—';

    // Color logic: green if at/below limit, amber if within 5%, neutral otherwise
    let ldClass = 'no-data';
    let rowClass = '';
    if (limitDiff !== null) {
      if (limitDiff <= 0) { ldClass = 'at-limit'; rowClass = 'row-at-limit'; }
      else if (limitDiff < 5) { ldClass = 'near-limit'; rowClass = 'row-near-limit'; }
      else { ldClass = 'far-limit'; }
    }

    if (tab === 'bdc') {
      const target = r.target || 0;
      const upside = (p && target) ? ((target - p) / p * 100) : null;
      const upsideStr = upside !== null ? (upside >= 0 ? '+' : '') + upside.toFixed(1) + '%' : '—';
      const uClass = upside !== null ? (upside > 0 ? 'up' : 'down') : 'no-data';

      html += `<tr class="${rowClass}">
        <td class="ticker-name">${esc(r.ticker)}</td>
        <td>${p ? '$' + fmtP(p) : '<span class="no-data">—</span>'}</td>
        <td class="editable" onclick="startEdit(this,'bdc',${idx},'limit')">${limit ? '$' + fmtP(limit) : '<span class="no-data">—</span>'}</td>
        <td class="${ldClass}">${limitDiffStr}</td>
        <td class="editable" onclick="startEdit(this,'bdc',${idx},'target')">${target ? '$' + fmtP(target) : '<span class="no-data">—</span>'}</td>
        <td class="${uClass}">${upsideStr}</td>
        <td class="note-cell editable" onclick="startEditNote(this,'bdc',${idx})">${noteSpan(r.note)}</td>
        <td><button class="btn-del" onclick="deleteRow('bdc',${idx})" title="Delete">✕</button></td>
      </tr>`;
    } else {
      html += `<tr class="${rowClass}">
        <td class="ticker-name">${esc(r.ticker)}</td>
        <td>${p ? '$' + fmtP(p) : '<span class="no-data">—</span>'}</td>
        <td class="editable" onclick="startEdit(this,'natres',${idx},'limit')">${limit ? '$' + fmtP(limit) : '<span class="no-data">—</span>'}</td>
        <td class="${ldClass}">${limitDiffStr}</td>
        <td class="note-cell editable" onclick="startEditNote(this,'natres',${idx})">${noteSpan(r.note)}</td>
        <td><button class="btn-del" onclick="deleteRow('natres',${idx})" title="Delete">✕</button></td>
      </tr>`;
    }
  }
  tbody.innerHTML = html;

  // Sort headers
  document.querySelectorAll(`#table-${tab} thead th`).forEach(th => {
    const col = th.dataset.col;
    if (!col) return;
    th.onclick = () => {
      if (s.col === col) s.dir = s.dir === 'asc' ? 'desc' : 'asc';
      else { s.col = col; s.dir = 'asc'; }
      document.querySelectorAll(`#table-${tab} thead th`).forEach(t => t.classList.remove('asc','desc'));
      th.classList.add(s.dir);
      renderTab(tab);
    };
    // Show current sort indicator
    if (s.col === col) th.classList.add(s.dir);
  });
}

function getSortVal(row, col, prices) {
  const p = prices[row.ticker] || 0;
  switch(col) {
    case 'ticker': return row.ticker;
    case 'price': return p || Infinity;
    case 'limit': return row.limit || Infinity;
    case 'target': return row.target || Infinity;
    case 'limitDiff': return (p && row.limit) ? (p - row.limit) / row.limit : Infinity;
    case 'upside': return (p && row.target) ? (row.target - p) / p : Infinity;
    case 'note': return row.note || '';
    default: return 0;
  }
}

function fmtP(v) {
  if (v >= 100) return v.toFixed(2);
  if (v >= 1) return v.toFixed(2);
  return v.toFixed(v < 0.1 ? 4 : 3);
}

function noteSpan(n) {
  return n ? `<span class="note-text has-note">${esc(n)}</span>`
           : `<span class="note-text">click to add note</span>`;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══════════════════════════════════════════════════════════════════
//  EDITING
// ══════════════════════════════════════════════════════════════════

function startEdit(td, tab, idx, field) {
  if (td.querySelector('input')) return;
  const val = DATA[tab][idx][field] || '';
  td.innerHTML = `<input type="text" value="${val}" autofocus>`;
  const input = td.querySelector('input');
  input.focus();
  input.select();
  const commit = () => {
    const nv = parseFloat(input.value);
    if (!isNaN(nv) && nv >= 0) {
      DATA[tab][idx][field] = nv;
      saveLocal();
      debouncedSync();
    }
    renderTab(tab);
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') commit();
    if (e.key === 'Escape') renderTab(tab);
  });
}

function startEditNote(td, tab, idx) {
  if (td.querySelector('input')) return;
  const val = DATA[tab][idx].note || '';
  td.innerHTML = `<input type="text" value="${esc(val)}" placeholder="Add note..." autofocus>`;
  const input = td.querySelector('input');
  input.focus();
  const commit = () => {
    DATA[tab][idx].note = input.value.trim();
    saveLocal();
    debouncedSync();
    renderTab(tab);
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') commit();
    if (e.key === 'Escape') renderTab(tab);
  });
}

// ══════════════════════════════════════════════════════════════════
//  ADD / DELETE ROWS
// ══════════════════════════════════════════════════════════════════

function addRow(tab) {
  const ticker = prompt('Enter ticker symbol:');
  if (!ticker) return;
  const limit = parseFloat(prompt('Limit order price (0 if none):') || '0');
  if (tab === 'bdc') {
    const target = parseFloat(prompt('Target price (0 if none):') || '0');
    DATA.bdc.push({ ticker: ticker.toUpperCase().trim(), limit, target, note: '' });
  } else {
    DATA.natres.push({ ticker: ticker.toUpperCase().trim(), limit, note: '' });
  }
  saveLocal();
  debouncedSync();
  renderTab(tab);
}

function deleteRow(tab, idx) {
  const ticker = DATA[tab][idx].ticker;
  if (confirm(`Delete ${ticker}?`)) {
    DATA[tab].splice(idx, 1);
    saveLocal();
    debouncedSync();
    renderTab(tab);
  }
}

function resetAllData() {
  if (!confirm('Reset all data to defaults? This will overwrite your current orders.')) return;
  DATA.bdc = JSON.parse(JSON.stringify(DEFAULT_BDC));
  DATA.natres = JSON.parse(JSON.stringify(DEFAULT_NATRES));
  saveLocal();
  debouncedSync();
  renderTab(activeTab);
  showSync('Reset to defaults ✓');
}

// ══════════════════════════════════════════════════════════════════
//  IMPORT / EXPORT
// ══════════════════════════════════════════════════════════════════

function exportData() {
  const blob = new Blob([JSON.stringify({ bdc: DATA.bdc, natres: DATA.natres }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'limit_orders_backup.json';
  a.click();
}

function importData() {
  const file = document.getElementById('importFile').files[0];
  if (!file) { alert('Select a file first'); return; }
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    if (file.name.endsWith('.json')) {
      try {
        const parsed = JSON.parse(text);
        if (parsed.bdc) DATA.bdc = parsed.bdc;
        if (parsed.natres) DATA.natres = parsed.natres;
        saveLocal();
        debouncedSync();
        renderTab(activeTab);
        showSync('Import successful ✓');
      } catch(err) { alert('Invalid JSON: ' + err.message); }
    } else if (file.name.endsWith('.csv')) {
      importCsv(text);
    }
  };
  reader.readAsText(file);
}

function importCsv(text) {
  const lines = text.trim().split('\n').map(l => l.replace(/\r/g, ''));
  if (lines.length < 2) { alert('CSV appears empty'); return; }
  const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
  const tickerCol = headers.findIndex(h => h.includes('tick'));
  const limitCol = headers.findIndex(h => h.includes('limit'));
  const targetCol = headers.findIndex(h => h.includes('target'));
  const noteCol = headers.findIndex(h => h.includes('note') || h.includes('column'));
  if (tickerCol === -1) { alert('Cannot find Ticker column in CSV'); return; }
  const hasTarget = targetCol !== -1;
  const tab = hasTarget ? 'bdc' : 'natres';
  const result = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',').map(c => c.trim());
    const ticker = cols[tickerCol];
    if (!ticker || ticker === '#N/A' || ticker === '') continue;
    const row = { ticker: ticker.toUpperCase(), limit: 0, note: '' };
    if (limitCol !== -1) row.limit = parseFloat(cols[limitCol]) || 0;
    if (hasTarget) row.target = parseFloat(cols[targetCol]) || 0;
    if (noteCol !== -1) row.note = cols[noteCol] || '';
    result.push(row);
  }
  if (result.length) {
    DATA[tab] = result;
    saveLocal();
    debouncedSync();
    switchTab(tab);
    showSync(`Imported ${result.length} rows into ${tab === 'bdc' ? 'BDC' : 'Natural Resources'} ✓`);
  }
}

// ══════════════════════════════════════════════════════════════════
//  LOCAL PERSISTENCE
// ══════════════════════════════════════════════════════════════════

function saveLocal() {
  lsSet('data_bdc', JSON.stringify(DATA.bdc));
  lsSet('data_natres', JSON.stringify(DATA.natres));
}

function loadLocal() {
  try {
    const bdc = lsGet('data_bdc');
    const natres = lsGet('data_natres');
    if (bdc) DATA.bdc = JSON.parse(bdc);
    if (natres) DATA.natres = JSON.parse(natres);
    return !!(bdc || natres);
  } catch(e) { return false; }
}

// ══════════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════════

async function init() {
  populateConfigFields();
  updateMarketStatus();
  setInterval(updateMarketStatus, 60000);

  const fromGist = await loadFromGist();
  if (!fromGist) {
    const fromLocal = loadLocal();
    if (!fromLocal) {
      DATA.bdc = JSON.parse(JSON.stringify(DEFAULT_BDC));
      DATA.natres = JSON.parse(JSON.stringify(DEFAULT_NATRES));
      saveLocal();
    }
  }

  renderTab('bdc');
  await refreshAll();
  document.getElementById('loading').classList.add('hide');

  // Auto-refresh every 5 minutes
  setInterval(refreshAll, 5 * 60 * 1000);
}

init();
